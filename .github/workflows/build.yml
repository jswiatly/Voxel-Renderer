name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          install_runtime: true
          cache: true
          stripdown: true

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

  linux:
    name: Linux (GCC)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          cache: true

      - name: Install GLFW build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j
